<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Insulin Easy — เลือกบทบาท</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #E8F5EE 0%, #D4E8DA 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    max-width: 480px;
    width: 100%;
    background: rgba(255,255,255,0.96);
    border-radius: 48px;
    box-shadow: 0 20px 35px -10px rgba(27, 107, 58, 0.25);
    backdrop-filter: blur(0px);
    overflow: hidden;
    text-align: center;
    padding: 32px 24px 48px;
    transition: all 0.3s ease;
  }

  .logo-area {
    margin-bottom: 24px;
  }

  .logo {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    object-fit: cover;
    display: inline-block;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #1B6B3A;
    letter-spacing: -0.3px;
  }

  .highlight {
    color: #E07B20;
  }

  .sub {
    font-size: 14px;
    color: #4A6356;
    margin-top: 6px;
    margin-bottom: 32px;
    font-weight: 500;
  }

  .role-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin: 20px 0 16px;
  }

  .role-card {
    background: #ffffff;
    border-radius: 32px;
    padding: 24px 20px;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: 1.5px solid #E2EFE7;
    text-align: center;
    text-decoration: none;
    display: block;
  }

  .role-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 18px 28px -8px rgba(27, 107, 58, 0.25);
    border-color: #A5D6B5;
  }

  .role-icon {
    font-size: 58px;
    margin-bottom: 12px;
  }

  .role-title {
    font-size: 24px;
    font-weight: 700;
    color: #1B6B3A;
    margin-bottom: 8px;
  }

  .role-desc {
    font-size: 13px;
    color: #5B7C6B;
    line-height: 1.4;
  }

  .btn-doctor {
    background: linear-gradient(115deg, #1B6B3A, #2E9D5A);
    color: white;
    border: none;
  }

  .btn-doctor .role-title {
    color: white;
  }

  .btn-doctor .role-desc {
    color: rgba(255, 255, 255, 0.85);
  }

  .btn-patient {
    background: white;
    border: 1.5px solid #A5D6B5;
  }

  .btn-patient .role-title {
    color: #1B6B3A;
  }

  .footer-note {
    margin-top: 32px;
    font-size: 12px;
    color: #7C978A;
    border-top: 1px solid #DAE8E2;
    padding-top: 18px;
  }

  @media (max-width: 480px) {
    .container {
      padding: 28px 20px 40px;
    }
    .role-icon {
      font-size: 48px;
    }
    .role-title {
      font-size: 22px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo-area">
    <!-- โลโก้ใช้ไฟล์ logo.png เช่นเดียวกับแอป -->
    <img class="logo" src="logo.png" alt="Insulin Easy" onerror="this.src='https://placehold.co/120x120?text=Insulin+Easy&bg=1B6B3A&color=white';">
  </div>
  <h1>Insulin <span class="highlight">Easy</span></h1>
  <div class="sub">ระบบบันทึกและคำนวณอินซูลินอัจฉริยะ</div>

  <div class="role-grid">
    <!-- ปุ่มไปหน้า DOCTOR -->
    <a href="doctor-dashboard.html" class="role-card btn-doctor">
      <div class="role-icon">🩺</div>
      <div class="role-title">แพทย์ / Doctor</div>
      <div class="role-desc">ดูข้อมูลคนไข้ทั้งหมด ตั้งค่าสูตรอินซูลิน</div>
    </a>

    <!-- ปุ่มไปหน้า PATIENT -->
    <a href="patient-app.html" class="role-card btn-patient">
      <div class="role-icon">👤</div>
      <div class="role-title">คนไข้ / Patient</div>
      <div class="role-desc">บันทึกน้ำตาล คาร์บ โน้ต รับคำแนะนำอินซูลิน</div>
    </a>
  </div>

  <div class="footer-note">
    ⚕️ Insulin Easy — เพื่อการดูแลสุขภาพที่ดีขึ้น
  </div>
</div>
</body>
</html>
